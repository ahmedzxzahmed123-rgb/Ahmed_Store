<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد ستور | متجر المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container nav-bar">
            <div class="logo">أحمد<span>ستور</span></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#">الرئيسية</a></li>
                    <li><a href="#products">المنتجات</a></li>
                    <li><a href="#">تواصل معنا</a></li>
                </ul>
            </nav>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>اكتشف الأناقة في كل تفصيلة</h1>
            <p>مجموعة حصرية من المنتجات العصرية بأفضل الأسعار في مصر.</p>
            <a href="#products" class="btn">تسوق الآن</a>
        </div>
    </section>

    <section class="products" id="products">
        <div class="container">
            <h2 class="section-title">أحدث المنتجات</h2>
            <div class="product-grid" id="product-list">
                </div>
        </div>
    </section>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>سلة المشتريات</h3>
            <i class="fas fa-times" onclick="toggleCart()"></i>
        </div>
        <div class="cart-items" id="cart-items">
            </div>
        <div class="cart-footer">
            <p>الإجمالي: <span id="cart-total">0</span> ج.م</p>
            <button class="checkout-btn">إتمام الشراء</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
